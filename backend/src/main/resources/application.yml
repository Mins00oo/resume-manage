spring:
  application:
    name: resume-manage
  profiles:
    active: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

app:
  upload:
    root-path: ${APP_UPLOAD_ROOT_PATH:./uploads}
  security:
    jwt:
      secret: ${APP_JWT_SECRET:change-me-in-local-yml-this-is-only-a-placeholder-and-must-be-32-chars-or-more}
      expiration-seconds: 86400
    oauth2:
      frontend-redirect-url: ${APP_FRONTEND_REDIRECT_URL:http://localhost:5173/oauth-callback}
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:8080
      - ${APP_CORS_ORIGIN:}
  web-push:
    # VAPID 키 — web-push-java 로 발급 후 환경변수로 주입.
    # 없으면 푸시 발송은 skip 되고 WARN 로그만 남김.
    public-key: ${APP_WEB_PUSH_PUBLIC_KEY:}
    private-key: ${APP_WEB_PUSH_PRIVATE_KEY:}
    subject: ${APP_WEB_PUSH_SUBJECT:mailto:alstn7223@gmail.com}
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: ${AI_CLAUDE_MODEL:claude-opus-4-6}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${AI_GPT_MODEL:gpt-5.4}
    google:
      api-key: ${GOOGLE_API_KEY:}
      model: ${AI_GEMINI_MODEL:gemini-2.5-pro}
    rate-limit:
      per-user-per-minute: 3
      max-raw-text-chars: 5000

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
