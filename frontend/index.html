<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <title>Resume Manage · Career Workspace</title>

    <!-- Daum Postcode (address search) -->
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <!-- Pretendard Variable (dynamic subset for fast initial paint) -->
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />

    <!-- Theme bootstrap (runs before React renders to avoid flash) -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var resolved;
          if (saved === 'light' || saved === 'dark') {
            resolved = saved;
          } else {
            // 'system' 또는 미저장 — prefers-color-scheme 따라감
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          }
          var root = document.documentElement;
          if (resolved === 'dark') root.classList.add('dark');
          root.style.colorScheme = resolved;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="datepicker-portal"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
